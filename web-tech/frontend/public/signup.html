<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Reset Password | Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-unlock-alt logo-icon"></i>
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form onsubmit="resetform(event)">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="username" required placeholder="Registered Email">
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>

                <div class="form-footer">
                    <div class="signup-prompt">
                        Remembered your password? <a href="login.html">Back to Login</a>
                    </div>
                </div>

                <h3 id="result" style="text-align: center; font-size: 0.9rem; margin-top: 15px;"></h3>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
